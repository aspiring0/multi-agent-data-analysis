

services:
  # Sandbox镜像构建（仅用于构建镜像，不运行服务）
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: multiagent-sandbox:latest
    container_name: multiagent-sandbox-build
    # 仅用于构建镜像，不实际运行
    command: ["echo", "Sandbox image ready"]

  # PostgreSQL 数据库
  postgres:
    image: postgres:16
    container_name: multiagent-postgres
    environment:
      POSTGRES_DB: langgraph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 后端
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: multiagent-backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_URI: postgresql://postgres:postgres@postgres:5432/langgraph
      PYTHONPATH: /app
    volumes:
      - ./src:/app/src:ro  # 只读挂载源代码
      - ./backend:/app/backend:ro
      - ./data:/app/data  # 上传文件目录
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
